Parameters:
  Environment:
    Type: String

  S3Bucket:
    Type: String

  ScriptKey:
    Type: String

  GlueJobName:
    Type: String

  WorkerType:
    Type: String

  NumberOfWorkers:
    Type: Number

Resources:

  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub GlueJobRole-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole

  GlueJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Ref GlueJobName
      Role: !GetAtt GlueJobRole.Arn

      Command:
        Name: glueetl
        ScriptLocation: !Sub s3://${S3Bucket}/${ScriptKey}
        PythonVersion: 3

      GlueVersion: "5.0"

      WorkerType: !Ref WorkerType
      NumberOfWorkers: !Ref NumberOfWorkers

      DefaultArguments:
        "--job-language": "python"
        "--enable-continuous-cloudwatch-log": "true"
        "--ENV": !Ref Environment
